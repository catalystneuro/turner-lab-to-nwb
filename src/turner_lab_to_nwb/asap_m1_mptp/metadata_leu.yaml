Subject:
  species: Macaca mulatta
  sex: F  # Female (Pasquereau & Turner, Brain 2016, doi:10.1093/brain/awv312)
  age: P0D/  # Full uncertainty, pending confirmation from Dr. Turner
  weight: 6 kg  # From Pasquereau & Turner, Brain 2016, doi:10.1093/brain/awv312
  description: MPTP-treated parkinsonian macaque monkey (Leu) used for motor cortex electrophysiology
surgery: |
  Aseptic surgery under Isoflurane inhalation anesthesia. Cylindrical stainless steel recording
  chamber implanted with stereotaxic guidance over left primary motor cortex (M1), oriented 35°
  to the coronal plane. Custom floating stimulating electrodes (Teflon-coated PtIr microwires,
  50-um diameter) implanted in posterior putamen, prepontine cerebral peduncle, VL thalamus,
  and subthalamic nucleus (STN) for antidromic identification of projection neuron types.
  Prophylactic antibiotics and analgesics administered perioperatively.
